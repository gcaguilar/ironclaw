name: Docker Image

on:
  # Called by release.yml or other workflows
  workflow_call:
    inputs:
      release:
        description: "Set true when called from release.yml to publish version/latest tags"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""
  # On-demand builds
  workflow_dispatch:
    inputs:
      release:
        description: "Set true to force release-style tags (:version, :latest, :sha-xxx)"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""

env:
  IMAGE_NAME: ghcr.io/gcaguilar/ironclaw
  WORKER_IMAGE_NAME: ghcr.io/gcaguilar/ironclaw-worker

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve source git commit
        id: source_sha
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Source commit: ${SOURCE_SHA}"

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Extracted version '${VERSION}' must match MAJOR.MINOR.PATCH[-prerelease] (Docker tags forbid '+')"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Validate tag override
        if: inputs.tag != ''
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${INPUT_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "::error::Input tag '${INPUT_TAG}' does not match Docker tag grammar"
            exit 1
          fi
          if [[ "${INPUT_TAG}" == "staging" ]]; then
            echo "::error::The staging tag has been retired. Use a different tag or rely on release tags."
            exit 1
          fi

      - name: Determine tags
        id: tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IS_RELEASE_BUILD: ${{ inputs.release && 'true' || 'false' }}
          INPUT_TAG: ${{ inputs.tag }}
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          SHA="sha-${SOURCE_SHA::7}"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

          if [[ "${IS_RELEASE_BUILD}" == "true" ]]; then
            # Release: :version + :latest + :sha-xxx
            TAGS="${IMAGE_NAME}:${VERSION}"
            TAGS="${TAGS},${IMAGE_NAME}:latest"
            TAGS="${TAGS},${IMAGE_NAME}:${SHA}"
            WORKER_TAGS="${WORKER_IMAGE_NAME}:${VERSION}"
            WORKER_TAGS="${WORKER_TAGS},${WORKER_IMAGE_NAME}:latest"
            WORKER_TAGS="${WORKER_TAGS},${WORKER_IMAGE_NAME}:${SHA}"
          else
            # Manual dispatch: :sha-xxx only
            TAGS="${IMAGE_NAME}:${SHA}"
            WORKER_TAGS="${WORKER_IMAGE_NAME}:${SHA}"
          fi

          if [[ -n "${INPUT_TAG}" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_TAG}"
            WORKER_TAGS="${WORKER_TAGS},${WORKER_IMAGE_NAME}:${INPUT_TAG}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "worker_tags=${WORKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "target=runtime" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Build (ironclaw)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.tags.outputs.tags }}
          target: ${{ steps.tags.outputs.target }}
          labels: |
            ironclaw.git.sha=${{ steps.source_sha.outputs.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (ironclaw-worker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: ${{ steps.tags.outputs.worker_tags }}
          labels: |
            ironclaw.git.sha=${{ steps.source_sha.outputs.sha }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Summary
        run: |
          {
            echo "## Docker Images"
            echo ""
            echo "**ironclaw:**"
            echo '```'
            echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n'
            echo '```'
            echo ""
            echo "**ironclaw-worker:**"
            echo '```'
            echo "${{ steps.tags.outputs.worker_tags }}" | tr ',' '\n'
            echo '```'
            echo ""
            echo "- version: \`${{ steps.version.outputs.version }}\`"
            echo "- sha: \`${{ steps.source_sha.outputs.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
