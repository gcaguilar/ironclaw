name: Docker Image

on:
  # Called by release.yml or other workflows
  workflow_call:
    inputs:
      release:
        description: "Set true when called from release.yml to publish version/latest tags"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""
  # On-demand builds
  workflow_dispatch:
    inputs:
      release:
        description: "Set true to force release-style tags (:version, :latest, :sha-xxx)"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""

env:
  IMAGE_NAME: ghcr.io/gcaguilar/ironclaw
  WORKER_IMAGE_NAME: ghcr.io/gcaguilar/ironclaw-worker

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.source_sha.outputs.sha }}
      sha_short: ${{ steps.source_sha.outputs.sha_short }}
      tags: ${{ steps.tags.outputs.tags }}
      worker_tags: ${{ steps.tags.outputs.worker_tags }}
      target: ${{ steps.tags.outputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve source git commit
        id: source_sha
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=sha-${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Source commit: ${SOURCE_SHA}"

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Extracted version '${VERSION}' must match MAJOR.MINOR.PATCH[-prerelease] (Docker tags forbid '+')"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Validate tag override
        if: inputs.tag != ''
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${INPUT_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "::error::Input tag '${INPUT_TAG}' does not match Docker tag grammar"
            exit 1
          fi
          if [[ "${INPUT_TAG}" == "staging" ]]; then
            echo "::error::The staging tag has been retired. Use a different tag or rely on release tags."
            exit 1
          fi

      - name: Determine tags
        id: tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IS_RELEASE_BUILD: ${{ inputs.release && 'true' || 'false' }}
          INPUT_TAG: ${{ inputs.tag }}
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha_short }}
        run: |
          if [[ "${IS_RELEASE_BUILD}" == "true" ]]; then
            TAGS="${IMAGE_NAME}:${VERSION},${IMAGE_NAME}:latest,${IMAGE_NAME}:${SOURCE_SHA}"
            WORKER_TAGS="${WORKER_IMAGE_NAME}:${VERSION},${WORKER_IMAGE_NAME}:latest,${WORKER_IMAGE_NAME}:${SOURCE_SHA}"
          else
            TAGS="${IMAGE_NAME}:${SOURCE_SHA}"
            WORKER_TAGS="${WORKER_IMAGE_NAME}:${SOURCE_SHA}"
          fi

          if [[ -n "${INPUT_TAG}" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_TAG}"
            WORKER_TAGS="${WORKER_TAGS},${WORKER_IMAGE_NAME}:${INPUT_TAG}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "worker_tags=${WORKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "target=runtime" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.image }}, ${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux/amd64
            runner: ubuntu-24.04
            image: ironclaw
            file: Dockerfile
            target: runtime
          - os: linux/arm64/v8
            runner: ubuntu-24.04-arm
            image: ironclaw
            file: Dockerfile
            target: runtime
          - os: linux/amd64
            runner: ubuntu-24.04
            image: ironclaw-worker
            file: Dockerfile.worker
            target: ""
          - os: linux/arm64/v8
            runner: ubuntu-24.04-arm
            image: ironclaw-worker
            file: Dockerfile.worker
            target: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute per-platform tag
        id: plat_tag
        run: |
          PLATFORM_SLUG="${{ matrix.os }}"
          PLATFORM_SLUG="${PLATFORM_SLUG//\//_}"
          echo "tag=${PLATFORM_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.image }} - ${{ matrix.os }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image == 'ironclaw-worker' && needs.version.outputs.worker_tags || needs.version.outputs.tags }},${{ matrix.image == 'ironclaw-worker' && needs.version.outputs.worker_tags || needs.version.outputs.tags }}+${{ steps.plat_tag.outputs.tag }}
          target: ${{ matrix.target }}
          labels: |
            ironclaw.git.sha=${{ needs.version.outputs.sha }}
          platforms: ${{ matrix.os }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    name: Merge Multi-Platform Manifests
    runs-on: ubuntu-24.04
    needs: [version, build]
    if: ${{ always() && needs.build.result == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge ironclaw manifests
        run: |
          TAGS="${{ needs.version.outputs.tags }}"
          for TAG in $(echo "$TAGS" | tr ',' '\n'); do
            echo "Merging multi-platform manifest for $TAG"
            docker buildx imagetools create -t "$TAG" \
              "${TAG}+linux_amd64" \
              "${TAG}+linux_arm64_v8"
          done

      - name: Merge ironclaw-worker manifests
        run: |
          TAGS="${{ needs.version.outputs.worker_tags }}"
          for TAG in $(echo "$TAGS" | tr ',' '\n'); do
            echo "Merging multi-platform manifest for $TAG"
            docker buildx imagetools create -t "$TAG" \
              "${TAG}+linux_amd64" \
              "${TAG}+linux_arm64_v8"
          done

  summary:
    name: Summary
    runs-on: ubuntu-24.04
    needs: [version, build, merge-manifests]
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## Docker Images"
            echo ""
            if [ "${{ needs.build.result }}" == "success" ]; then
              echo "**All builds passed**"
            elif [ "${{ needs.build.result }}" == "failure" ]; then
              echo "**Some builds failed**"
            else
              echo "**Builds skipped or cancelled**"
            fi
            echo ""
            echo "**ironclaw:**"
            echo '```'
            echo "${{ needs.version.outputs.tags }}" | tr ',' '\n'
            echo '```'
            echo ""
            echo "**ironclaw-worker:**"
            echo '```'
            echo "${{ needs.version.outputs.worker_tags }}" | tr ',' '\n'
            echo '```'
            echo ""
            echo "- version: \`${{ needs.version.outputs.version }}\`"
            echo "- sha: \`${{ needs.version.outputs.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
